{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>
                    <i class="bi bi-pencil-square"></i>
                    Edit Patient
                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">Patient Name</label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            value="{{ patient.name }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Age</label>

                        <input
                            type="number"
                            class="form-control"
                            name="age"
                            value="{{ patient.age }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Risk Level</label>

                        <select
                            class="form-select"
                            name="risk">

                            <option value="High"
                            {% if patient.risk == "High" %}selected{% endif %}>
                                High
                            </option>

                            <option value="Moderate"
                            {% if patient.risk == "Moderate" %}selected{% endif %}>
                                Moderate
                            </option>

                            <option value="Low"
                            {% if patient.risk == "Low" %}selected{% endif %}>
                                Low
                            </option>

                        </select>

                    </div>

                    <button class="btn btn-success">

                        <i class="bi bi-check-circle"></i>

                        Save Changes

                    </button>

                    <a href="/dashboard" class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
